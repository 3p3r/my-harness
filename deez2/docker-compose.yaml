name: deez2

services:
  gemma4-llama-a:
    image: ghcr.io/ggml-org/llama.cpp:server-vulkan
    container_name: gemma4-llama-a
    restart: unless-stopped
    init: true
    network_mode: host
    ipc: host
    group_add:
      - video
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - /root/.cache/huggingface:/root/.cache/huggingface
    environment:
      HF_HOME: /root/.cache/huggingface
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    stop_grace_period: 5m
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30m
    command:
      - -hf
      - AgentAnon/gemma-4-26B-A4B-it-uncensored-GGUF
      - -hff
      - gemma-4-26B-A4B-it-uncensored-Q8_0.gguf
      - -a
      - TrevorJS/gemma-4-26B-A4B-it-uncensored
      - -c
      - "262144"
      - -ngl
      - "999"
      - -fa
      - auto
      - --no-mmap
      - -ctk
      - q8_0
      - -ctv
      - q8_0
      - -ub
      - "256"
      - -b
      - "512"
      - --parallel
      - "2"
      - --kv-unified
      - --cache-prompt
      - --cache-reuse
      - "256"
      - --cache-ram
      - "0"
      - --spec-type
      - ngram-map-k
      - --reasoning
      - on
      - --reasoning-format
      - auto
      - --sleep-idle-seconds
      - "3600"
      - --jinja
      - --host
      - 0.0.0.0
      - --port
      - "8000"

  gemma4-llama-b:
    image: ghcr.io/ggml-org/llama.cpp:server-vulkan
    container_name: gemma4-llama-b
    restart: unless-stopped
    init: true
    network_mode: host
    ipc: host
    group_add:
      - video
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - /root/.cache/huggingface:/root/.cache/huggingface
    environment:
      HF_HOME: /root/.cache/huggingface
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    stop_grace_period: 5m
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30m
    command:
      - -hf
      - AgentAnon/gemma-4-26B-A4B-it-uncensored-GGUF
      - -hff
      - gemma-4-26B-A4B-it-uncensored-Q8_0.gguf
      - -a
      - TrevorJS/gemma-4-26B-A4B-it-uncensored
      - -c
      - "262144"
      - -ngl
      - "999"
      - -fa
      - auto
      - --no-mmap
      - -ctk
      - q8_0
      - -ctv
      - q8_0
      - -ub
      - "256"
      - -b
      - "512"
      - --parallel
      - "2"
      - --kv-unified
      - --cache-prompt
      - --cache-reuse
      - "256"
      - --cache-ram
      - "0"
      - --spec-type
      - ngram-map-k
      - --reasoning
      - on
      - --reasoning-format
      - auto
      - --sleep-idle-seconds
      - "3600"
      - --jinja
      - --host
      - 0.0.0.0
      - --port
      - "8001"
