name: deezx

services:
  qwen36-research-a-llama:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: qwen36-research-a-llama
    restart: unless-stopped
    init: true
    gpus: all
    network_mode: host
    volumes:
      - /root/models/qwen3.6-27b-gguf:/models:ro
      - ./tool_chat_template_qwen3coder.jinja:/opt/plugins/tool_chat_template_qwen3coder.jinja:ro
    environment:
      CUDA_VISIBLE_DEVICES: "0"
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    stop_grace_period: 5m
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 20m
    command:
      - -m
      - /models/Qwen_Qwen3.6-27B-Q4_K_M.gguf
      - --no-mmproj
      - -a
      - Qwen/Qwen3.6-27B
      - -c
      - "131072"
      - -dev
      - CUDA0
      - -ngl
      - all
      - -fa
      - auto
      - -ctk
      - q8_0
      - -ctv
      - q8_0
      - -ub
      - "1024"
      - -b
      - "1024"
      - --cache-ram
      - "0"
      - -np
      - "1"
      - --reasoning
      - on
      - --reasoning-format
      - deepseek
      - --sleep-idle-seconds
      - "3600"
      - --jinja
      - --chat-template-file
      - /opt/plugins/tool_chat_template_qwen3coder.jinja
      - --host
      - 0.0.0.0
      - --port
      - "8000"

  qwen36-research-b-llama:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: qwen36-research-b-llama
    restart: unless-stopped
    init: true
    gpus: all
    network_mode: host
    volumes:
      - /root/models/qwen3.6-27b-gguf:/models:ro
      - ./tool_chat_template_qwen3coder.jinja:/opt/plugins/tool_chat_template_qwen3coder.jinja:ro
    environment:
      CUDA_VISIBLE_DEVICES: "1"
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    stop_grace_period: 5m
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 20m
    command:
      - -m
      - /models/Qwen_Qwen3.6-27B-Q4_K_M.gguf
      - --no-mmproj
      - -a
      - Qwen/Qwen3.6-27B
      - -c
      - "131072"
      - -dev
      - CUDA0
      - -ngl
      - all
      - -fa
      - auto
      - -ctk
      - q8_0
      - -ctv
      - q8_0
      - -ub
      - "1024"
      - -b
      - "1024"
      - --cache-ram
      - "0"
      - -np
      - "1"
      - --reasoning
      - on
      - --reasoning-format
      - deepseek
      - --sleep-idle-seconds
      - "3600"
      - --jinja
      - --chat-template-file
      - /opt/plugins/tool_chat_template_qwen3coder.jinja
      - --host
      - 0.0.0.0
      - --port
      - "8001"
