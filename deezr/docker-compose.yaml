name: deezr

services:
  camofox-browser:
    image: ghcr.io/redf0x1/camofox-browser:latest
    container_name: camofox-browser
    restart: unless-stopped
    ports:
      - "9377:9377"
    environment:
      CAMOFOX_HOST: "0.0.0.0"
      CAMOFOX_PORT: "9377"
      CAMOFOX_API_KEY: "this-fleet-is-local"
  litellm-proxy:
    image: docker.litellm.ai/berriai/litellm:main-latest
    container_name: litellm-proxy
    restart: unless-stopped
    init: true
    ports:
      - "4000:4000"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./rules.py:/app/rules.py:ro
    environment:
      DISABLE_ADMIN_UI: "true"
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    stop_grace_period: 2m
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:4000/v1/models', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 2m
    command:
      - --config
      - /app/config.yaml
